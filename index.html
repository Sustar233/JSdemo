<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<p class="test">My first ajax web</p>
	<input type="text" id="username" placeholder="input username">
	<input type="text" id="age" placeholder="input age">
	<button id="btn">click me</button>
	<script type="text/javascript">
		
		let test = document.querySelector('.test');
		let btn = document.querySelector('#btn');
		
		btn.addEventListener('click', () => {
			// 获取用户输入的值
			let username = document.querySelector('#username');
			let age = document.querySelector('#age');
			// 手动进行字符串拼接
			let params = 'username=' + username.value + '&age=' + age.value;
			// 1.创建ajax对象
			var xhr = new XMLHttpRequest();
			// 2.告诉Ajax对象要想哪发送请求，以什么方式发送请求
			// 1)请求方式 2)请求地址
			xhr.open('get', 'http://localhost:3000/first?' + params);
			// 3.发送请求
			xhr.send();
			// 4.获取服务器端响应到客户端的数据
			xhr.onload = function() {
				console.log(xhr.responseText);
				// 将JSON字符串转换成JSON对象
				let responseText = JSON.parse(xhr.responseText);
				// 字符串拼接
				let headone = '<h3>' + 'welcome to web ' + responseText.username + '</h3>'
				// 追加到页面
				test.innerHTML = headone;
			}
		})
	</script>
</body>
</html>
